name: build-web

# Keep the in-browser bundle (wigle_web.html) in sync with the Python sources and
# compile-check every script. On push to main: rebuild and auto-commit the bundle
# if it drifted. On pull requests: compile-check + fail if the committed bundle is
# stale (so you remember to run build_web.py). Also runnable from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'wigle_*.py'
      - 'build_web.py'
  pull_request:
    paths:
      - 'wigle_*.py'
      - 'build_web.py'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-web
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compile-check all modules
        run: python -m py_compile wigle_*.py build_web.py

      - name: Rebuild wigle_web.html
        run: python build_web.py

      - name: PR — fail if the committed bundle is stale
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- wigle_web.html; then
            echo "wigle_web.html is up to date."
          else
            echo "::error::wigle_web.html is stale — run 'python build_web.py' and commit it."
            git --no-pager diff --stat -- wigle_web.html
            exit 1
          fi

      - name: push — auto-commit the refreshed bundle
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- wigle_web.html; then
            echo "wigle_web.html already up to date."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add wigle_web.html
            git commit -m "ci: rebuild wigle_web.html [skip ci]"
            git push
          fi
